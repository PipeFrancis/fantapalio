<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <title>Crea Squadra</title>
    <link rel="icon" href="../fantapalio_icon.png">
    <link rel="stylesheet" href="../style.css?v=260509_1316">
</head>
<body>
    <div class="background"></div>
    <div class="content">
    <!-- <header>
        <h1>Prova a creare la tua squadra</h1>
    </header> -->
    <main>
        
        <div class="container">
            <p class="highlighted-text team_simulation_message">Seleziona <b>5</b> giocatori e il rione di appartenenza, hai <b>30$</b> a disposizione.
                <br>Poi, inserisci il nome della squadra, la tua email, il tuo Nome e Cognome, e indica se ci sarai alla finale per le premiazioni.                
                <br>Hai tempo fino a <b>domenica sera alle 20:00</b>.
            </p>
            
            
            <div class="players-container" id="playersContainer">
                <!-- Qui verranno aggiunte dinamicamente le card dei giocatori -->
            </div>
            <h2 class="highlighted-text">Il tuo team:</h2>
            <div class="team-container" id="teamContainer">
                <!-- Qui verranno aggiunti dinamicamente i giocatori selezionati -->
                <p><em>Team vuoto</em></p>
            </div>
            <div id="user-info" style="margin-top: 20px;">
                <input type="text" id="teamNameInput" placeholder="Nome della Squadra" class="form-input">
                <input type="email" id="emailInput" placeholder="La tua Email" class="form-input">
            </div>
            
        </div>
        <div class="button-container">
            <a href="../index.html"><button class="rectangle-button">Indietro</button></a>
        </div>
        <script type="module" src="team_simulation.js?v=260509_1316"></script>
    </main>
    <!--
    <footer>
        <p>Creato da [Il Tuo Nome]</p>
    </footer>
    -->
    </div>
</body>
