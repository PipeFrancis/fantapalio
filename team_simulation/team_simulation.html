<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <title>Crea Squadra</title>
    <link rel="icon" href="../fantapalio_icon.png">
    <link rel="stylesheet" href="../style.css?v=260509_1342">
</head>
<body>
    <div class="background"></div>
    <div class="content">
    <!-- <header>
        <h1>Prova a creare la tua squadra</h1>
    </header> -->
    <main>
        
        <div class="container">
            <p class="highlighted-text team_simulation_message">Seleziona <b>5</b> giocatori e il rione di appartenenza, hai <b>30$</b> a disposizione.
                <br>Poi, inserisci il nome della squadra, la tua email, il tuo Nome e Cognome, e indica se ci sarai alla finale per le premiazioni.                
                <br>Hai tempo fino a <b>domenica sera alle 20:00</b>.
            </p>
            
            
            <div class="players-container" id="playersContainer">
                <!-- Qui verranno aggiunte dinamicamente le card dei giocatori -->
            </div>
            <h2 class="highlighted-text">Il tuo team:</h2>
            <div class="team-container" id="teamContainer">
                <!-- Qui verranno aggiunti dinamicamente i giocatori selezionati -->
                <p><em>Team vuoto</em></p>
            </div>
            <div id="user-info">
                <!-- 1. Rione Selection -->
                <label for="rioneInput">Rione:</label>
                <select id="rioneInput">
                    <option value="" disabled selected>Seleziona Rione</option>
                    <option value="NORD">NORD</option>
                    <option value="SUD">SUD</option>
                    <option value="EST">EST</option>
                    <option value="WEST">WEST</option>
                </select>

                <!-- 2. Team Name -->
                <label for="teamNameInput">Nome della Squadra:</label>
                <input type="text" id="teamNameInput" placeholder="Inserisci nome team" class="form-input">

                <!-- 3. Email -->
                <label for="emailInput">Email:</label>
                <input type="email" id="emailInput" placeholder="latua@email.com" class="form-input">

                <!-- 4. Nome e Cognome -->
                <label for="fullNameInput">Nome e Cognome:</label>
                <input type="text" id="fullNameInput" placeholder="Mario Rossi" class="form-input">

                <!-- 5. Presence Selection -->
                <label for="attendanceInput">Sarai presente alle premiazioni finali sabato 18 luglio?</label>
                <select id="attendanceInput">
                    <option value="SI">Sì</option>
                    <option value="NO">No</option>
                </select>
            </div>
            
        </div>
        <div class="button-container">
            <a href="../index.html"><button class="rectangle-button">Indietro</button></a>
        </div>
        <script type="module" src="team_simulation.js?v=260509_1342"></script>
    </main>
    <!--
    <footer>
        <p>Creato da [Il Tuo Nome]</p>
    </footer>
    -->
    </div>
</body>
</html>
